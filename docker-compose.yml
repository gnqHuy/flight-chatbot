services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: flight_chatbot_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: huy123456789
      POSTGRES_DB: flight_chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ota_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flight_chatbot_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - ota_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MCP Knowledge Server ───────────────────────────────────────────────────
  knowledge_mcp:
    build:
      context: ./mcp_knowledge
      dockerfile: Dockerfile
    container_name: flight_mcp_knowledge
    ports:
      - "5001:5001"
    env_file:
      - ./mcp_knowledge/.env
    environment:
      DATABASE_URL: "postgresql://postgres:huy123456789@postgres:5432/flight_chatbot"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: on-failure
    networks:
      - ota_network

  # ── MCP Flight Server ──────────────────────────────────────────────────────
  mcp_flight:
    build:
      context: ./mcp-flight
      dockerfile: Dockerfile
    container_name: flight_mcp_flight
    ports:
      - "8001:8001"
    env_file:
      - ./mcp-flight/.env
    environment:
      DATABASE_URL: "postgresql://postgres:huy123456789@postgres:5432/flight_chatbot"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: on-failure
    networks:
      - ota_network

volumes:
  pgdata:
  redisdata:

networks:
  ota_network:
    driver: bridge
